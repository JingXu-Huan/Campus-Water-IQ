name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '25 3 * * 3'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 300  # ⭐ 防止卡死无限跑

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none

          - language: java-kotlin
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ⭐ JDK 安装提前到 CodeQL 初始化之前
      # 确保初始化时 Java 环境已就绪，避免潜在的工具链识别问题
      - name: Set up JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'  # ⭐ 缓存 Maven 依赖，显著加快后续构建

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Build Java project
        if: matrix.language == 'java-kotlin'
        shell: bash
        run: |
          # ⭐ --no-transfer-progress 去掉下载进度条，日志更干净
          # ⭐ -T 1C 并行编译，每个 CPU 核心一个线程
          mvn clean compile -DskipTests --no-transfer-progress -T 1C

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          # ⭐ 上传 SARIF 结果到 GitHub Security 面板
          upload: always